server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: trainer-workload-service

eureka:
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:false}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{transactionId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
