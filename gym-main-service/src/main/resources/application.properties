spring.application.name=gym-management-service

spring.profiles.active=local

server.port=${SERVER_PORT:8080}

eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:false}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{transactionId}] %-5level %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

management.metrics.tags.application=${spring.application.name}

management.prometheus.metrics.export.enabled=true

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

spring.cloud.openfeign.client.config.trainer-workload-service.connect-timeout=${WORKLOAD_CONNECT_TIMEOUT_MS:2000}
spring.cloud.openfeign.client.config.trainer-workload-service.read-timeout=${WORKLOAD_READ_TIMEOUT_MS:3000}

resilience4j.circuitbreaker.instances.workloadService.sliding-window-size=10
resilience4j.circuitbreaker.instances.workloadService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workloadService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.workloadService.permitted-number-of-calls-in-half-open-state=3