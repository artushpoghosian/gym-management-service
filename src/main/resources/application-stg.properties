spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gymdb_stg}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:gym_stg_user}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.sql.init.mode=never

spring.h2.console.enabled=false

logging.level.com.gym=INFO
cors.allowed-origins=https://staging.gym.example.com
